<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobitex ML Trader</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #00d4aa; font-size: 1.5rem; margin-bottom: 20px; }
        h2 { font-size: 1.2rem; margin: 0 0 10px 0; }
        h3 { font-size: 1rem; margin: 0 0 10px 0; }
        
        .status-bar {
            background: #1a1f2e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 20px;
            background: #2a2f3e;
        }
        .online { color: #00d4aa; }
        .offline { color: #ff4757; }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2a2f3e;
            cursor: pointer;
            transition: all 0.2s;
        }
        .card:hover {
            border-color: #00d4aa;
            transform: translateY(-2px);
        }
        .symbol { font-size: 1rem; font-weight: bold; color: #00d4aa; }
        .price { font-size: 1.3rem; font-weight: bold; margin: 8px 0; }
        .change { font-size: 0.9rem; }
        .change.positive { color: #00d4aa; }
        .change.negative { color: #ff4757; }
        .small { font-size: 0.7rem; color: #888; margin-top: 5px; }
        
        .prediction-card {
            background: linear-gradient(135deg, #1a2a3a, #0f1a2a);
            border: 2px solid #00d4aa;
        }
        
        .log-panel {
            background: #0d1117;
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 250px;
            overflow-y: auto;
        }
        .log-line {
            padding: 4px 0;
            border-bottom: 1px solid #1a1f2e;
            font-family: monospace;
        }
        
        button {
            background: #2a2f3e;
            border: none;
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #3a3f4e; }
        
        .timeframe-buttons {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        .tf-btn {
            background: #2a2f3e;
            padding: 4px 10px;
            font-size: 0.75rem;
        }
        .tf-btn.active {
            background: #00d4aa;
            color: #0a0e1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Nobitex ML Trader</h1>
        
        <div class="status-bar">
            <div class="status-badge">
                <span>🔌 WebSocket:</span>
                <span id="ws-status" class="offline">🔴 خاموش</span>
            </div>
            <div class="status-badge">
                <span>🕐 آخرین آپدیت:</span>
                <span id="last-update">---</span>
            </div>
            <div class="status-badge">
                <span>💾 رم:</span>
                <span id="ram">---</span>
            </div>
            <button id="clear-logs-btn">🗑️ پاک‌سازی لاگ</button>
            <button onclick="refreshAll()">🔄 بروزرسانی</button>
        </div>

        <div class="grid-2">
            <div class="card prediction-card" id="prediction-card">
                <h3>🔮 پیش‌بینی</h3>
                <div>انتخاب نماد...</div>
            </div>
            <div class="card">
                <h3>📈 تایم‌فریم</h3>
                <div class="timeframe-buttons" id="timeframe-buttons">
                    <button class="tf-btn" data-tf="15min">15 دقیقه</button>
                    <button class="tf-btn active" data-tf="1h">1 ساعت</button>
                    <button class="tf-btn" data-tf="4h">4 ساعت</button>
                    <button class="tf-btn" data-tf="1D">روزانه</button>
                </div>
                <div class="small mt-2">کلیک روی هر نماد برای مشاهده پیش‌بینی</div>
            </div>
        </div>

        <h2>💰 بازارها</h2>
        <div class="grid" id="symbols-grid">
            <div class="card">در حال بارگذاری...</div>
        </div>

        <div class="card">
            <h3>📋 لاگ سیستم</h3>
            <div class="log-panel" id="log-panel">
                <div class="log-line">در انتظار دریافت لاگ...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
